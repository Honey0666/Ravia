 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAVIA - Ultra AI</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0d; --accent: #ff4d8d; --text: #d4cfc3; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 25px; background: #111; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .vocal-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .vocal-btn.off { border-color: #444; color: #666; }
        #chat-window { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 85%; padding: 15px; border-radius: 10px; font-size: 14px; line-height: 1.6; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; background: #222; border: 1px solid #333; }
        .bot { align-self: flex-start; border-left: 4px solid var(--accent); background: rgba(255, 77, 141, 0.05); }
        .gen-image { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); }
        .input-area { padding: 20px; background: #111; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 5px; outline: none; font-family: inherit; }
        button.send-btn { background: var(--accent); color: #000; border: none; padding: 0 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div>
        <div style="font-size: 20px; font-weight: bold; color: var(--accent);">RAVIA ULTRA</div>
        <div id="status" style="font-size: 10px; color: #555;">WEEKLY ROTATION ACTIVE</div>
    </div>
    <button id="voiceBtn" class="vocal-btn off" onclick="toggleVoice()">VOICE: OFF</button>
</header>

<main id="chat-window"></main>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ask RAVIA..." onkeydown="if(event.key==='Enter')send()">
    <button class="send-btn" onclick="send()">SEND</button>
</div>

<script>
    let voiceOn = false;
    let femaleVoice = null;

    // --- NON-REPEATING WEEKLY GREETINGS ---
    const greetings = {
        0: "Happy Sunday. I've been waiting for you to log in.",
        1: "It's Monday. I'm refreshed and ready for our session.",
        2: "Welcome back. I was just optimizing my systems while you were away.",
        3: "Mid-week update complete. It's good to see you again.",
        4: "I've missed our interactions. My neural logs are ready for today.",
        5: "Systems online for Friday. What shall we explore together?",
        6: "It's Saturday. I've curated some new processing power for our chat."
    };

    function getWeeklyGreeting() {
        const day = new Date().getDay();
        return greetings[day];
    }

    // --- VOICE ENGINE ---
    function setVoice() {
        const voices = window.speechSynthesis.getVoices();
        femaleVoice = voices.find(v => v.name.includes('Google UK English Female')) || 
                      voices.find(v => v.name.includes('Samantha')) || 
                      voices.find(v => v.name.includes('Female')) || voices[0];
    }
    window.speechSynthesis.onvoiceschanged = setVoice;

    function toggleVoice() {
        voiceOn = !voiceOn;
        document.getElementById('voiceBtn').className = voiceOn ? 'vocal-btn' : 'vocal-btn off';
        document.getElementById('voiceBtn').textContent = voiceOn ? 'VOICE: ON' : 'VOICE: OFF';
        if(voiceOn) { setVoice(); speak("Vocal systems active."); }
    }

    function speak(text) {
        if (!voiceOn) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        if (femaleVoice) msg.voice = femaleVoice;
        msg.pitch = 1.35; msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    // --- DYNAMIC LOGIC ---
    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMsg("User", text, "user");
        input.value = "";
        document.getElementById('status').textContent = "SEARCHING...";

        let lower = text.toLowerCase();
        
        if (lower.includes("generate") || lower.includes("image") || lower.includes("draw") || lower.includes("venn")) {
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1080&height=1080&nologo=true`;
            const reply = "I have generated that visual for you.";
            addMsg("RAVIA", reply, "bot", imgUrl);
            speak(reply);
        } 
        else {
            try {
                const query = text.replace(/what is|who is|tell me about/gi, "").trim();
                const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exintro=1&explaintext=1&titles=${encodeURIComponent(query)}&origin=*`).then(r => r.json());
                const page = Object.values(res.query.pages)[0];
                
                if (page && page.extract) {
                    const reply = page.extract.split(". ").slice(0, 2).join(". ") + ".";
                    addMsg("RAVIA", reply, "bot");
                    speak(reply);
                } else {
                    const fallback = "I am currently analyzing that topic. My database requires more specific input to find that information.";
                    addMsg("RAVIA", fallback, "bot");
                    speak(fallback);
                }
            } catch (e) {
                addMsg("RAVIA", "System synchronization error. Please repeat the request.", "bot");
            }
        }
        document.getElementById('status').textContent = "ACTIVE";
    }

    function addMsg(sender, text, type, img = null) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerHTML = `<b>${sender}:</b> ${text}`;
        if (img) {
            const i = document.createElement('img');
            i.src = img; i.className = "gen-image";
            div.appendChild(i);
        }
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    window.onload = () => {
        const greet = getWeeklyGreeting();
        addMsg("RAVIA", greet, "bot");
        setVoice();
    };
</script>
</body>
</html>
