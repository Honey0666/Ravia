<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAVIA - Vocal AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://unpkg.com/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>
<style>
/* ─── STYLING ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{ --bg:#0f0f0e;--surface:#1a1917;--surface2:#222120;--accent:#d4cfc3;--text:#d4cfc3;--text-dim:#8c887e;--border:#33312e; --active-voice:#4caf50; }
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}

header{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
.status-pill{font-size:0.6rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px}

#voice-control-panel { display:flex; align-items:center; gap:15px; }
.vocal-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; transition: 0.3s; font-family: inherit; }
.vocal-btn.active { border-color: var(--active-voice); color: var(--active-voice); box-shadow: 0 0 10px rgba(76, 175, 80, 0.3); }

main{flex:1;display:flex;overflow:hidden}
#chat-container{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border)}
#chat-window{flex:1;overflow-y:auto;padding:2rem;display:flex;flex-direction:column;gap:1.2rem}
.bubble{max-width:85%;padding:1rem;border-radius:2px;font-size:0.9rem;animation:fadeIn 0.3s ease forwards;line-height:1.5}
.user{align-self:flex-end;background:var(--surface2);border:1px solid var(--border)}
.bot{align-self:flex-start;border-left:2px solid var(--accent);padding-left:1rem;background:rgba(212,207,195,0.03)}

#input-area{padding:1.5rem;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
input[type="text"]{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);padding:0.5rem;outline:none;font-family:inherit}

#sidebar{width:300px;background:var(--surface);display:flex;flex-direction:column}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab-btn{flex:1;padding:12px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-size:0.65rem;text-transform:uppercase}
.tab-btn.active{color:var(--text);border-bottom:2px solid var(--accent)}
.tab-content{display:none;padding:1rem;flex:1;overflow-y:auto}
.tab-content.active{display:block}
button{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:0.5rem;cursor:pointer;font-size:0.7rem; font-family: inherit;}
.img-preview{max-width:100%; border-radius:4px; margin-top:10px; border:1px solid var(--border)}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div>
    <h1 style="font-size:1.2rem; letter-spacing: 2px;">RAVIA</h1>
    <span id="mem-status" class="status-pill">Systems Active</span>
  </div>
  
  <div id="voice-control-panel">
    <span id="mood-display" style="font-size:0.65rem; color:var(--accent)">Mood: Neutral</span>
    <button id="voiceBtn" class="vocal-btn" onclick="toggleVoice()">VOICE: OFF</button>
  </div>
</header>

<main>
  <div id="chat-container">
    <div id="chat-window">
      <div class="bubble bot">Welcome back, Honey. Make sure to click <b>VOICE: OFF</b> to turn it <b>ON</b> if you want me to speak!</div>
    </div>
    <div id="input-area">
      <input type="file" id="imgUpload" hidden accept="image/*" onchange="analyzeImage(event)">
      <button onclick="document.getElementById('imgUpload').click()" style="border-radius: 50%; width: 40px; height: 40px;">📷</button>
      <input type="text" id="userInput" placeholder="Ask me or use /wiki..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()" style="padding: 0 20px;">SEND</button>
    </div>
  </div>

  <aside id="sidebar">
    <div class="tabs">
      <button class="tab-btn active" onclick="openTab('knowledge')">Knowledge</button>
      <button class="tab-btn" onclick="openTab('rnn-tab')">Brain</button>
    </div>

    <div id="knowledge" class="tab-content active">
        <p style="font-size:0.7rem; color:var(--text-dim); margin-bottom:10px">Wikipedia Presets:</p>
        <div id="preset-container" style="display:grid; grid-template-columns:1fr 1fr; gap:5px"></div>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
        <p style="font-size:0.7rem; color:var(--text-dim); margin-bottom:10px">Remote File (URL/Google Drive):</p>
        <input type="text" id="fileUrl" placeholder="https://..." style="width:100%; padding:5px; background:black; color:white; border:1px solid var(--border); margin-bottom:5px;">
        <button onclick="fetchRemoteFile()" style="width:100%">Load File</button>
        <button onclick="clearMemory()" style="width:100%; margin-top:20px; color:#ff5f5f; border-color:#442222">Wipe All Memory</button>
    </div>

    <div id="rnn-tab" class="tab-content">
        <textarea id="corpus" style="width:100%; height:250px; background:#000; color:#0f0; font-family:monospace; font-size:0.65rem; border:1px solid var(--border); padding:10px">
Q: Hello | A: Hi Honey! Ready to explore?
Q: Who are you? | A: I am RAVIA, your custom intelligence.
Q: How are you? | A: I'm feeling optimized and witty!
Q: Can you help me? | A: Always. What's on your mind?
        </textarea>
        <button onclick="trainRNN()" style="width:100%; margin-top:10px">Update Logic</button>
    </div>
  </aside>
</main>

<script>
// ─── STATE & PERSISTENCE ──────────────────────────────────────────────────
const BOT_NAME = 'RAVIA';
const USER_NAME = 'Honey';
let sentences = JSON.parse(localStorage.getItem('ravia_kb')) || [];
let rnn = null, visionModel = null, voiceEnabled = false;
let charToIdx = {}, idxToChar = {};

// ─── VOICE SYSTEM ───────────────────────────────────────────────────────────
function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    const btn = document.getElementById('voiceBtn');
    if (voiceEnabled) {
        btn.classList.add('active');
        btn.textContent = "VOICE: ON";
        speak("Voice systems online. It's good to finally talk to you, Honey!");
    } else {
        btn.classList.remove('active');
        btn.textContent = "VOICE: OFF";
        window.speechSynthesis.cancel();
    }
}

function speak(text, mood = "Neutral") {
    if (!voiceEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel(); 
    const utterance = new SpeechSynthesisUtterance(text);
    if (mood === "Cheerful") { utterance.pitch = 1.3; utterance.rate = 1.1; }
    else if (mood === "Empathetic") { utterance.pitch = 0.8; utterance.rate = 0.85; }
    else { utterance.pitch = 1.0; utterance.rate = 1.0; }
    window.speechSynthesis.speak(utterance);
}

// ─── CHAT ENGINE ────────────────────────────────────────────────────────────
function analyzeSentiment(text) {
    const t = text.toLowerCase();
    if (t.match(/sad|lonely|hurt|bad/)) return { mood: "Empathetic", tone: "I'm so sorry, Honey. " };
    if (t.match(/happy|good|great|awesome/)) return { mood: "Cheerful", tone: "That's wonderful! " };
    return { mood: "Neutral", tone: "" };
}

async function sendMsg() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    const sentiment = analyzeSentiment(text);
    document.getElementById('mood-display').textContent = `Mood: ${sentiment.mood}`;
    addMessage(USER_NAME, text, 'user');
    input.value = '';

    // Identity/Fish Fix
    if (text.toLowerCase().includes("fish") && text.toLowerCase().includes("what")) {
        const reply = "A fish is an aquatic creature with gills. You, Honey, are a human. Let's not get our species mixed up!";
        addMessage(BOT_NAME, reply, "bot");
        speak(reply, sentiment.mood);
        return;
    }

    // Wiki Command
    if (text.startsWith('/wiki ')) {
        await fetchWiki(text.replace('/wiki ', ''));
        const r = "I've indexed that Wikipedia entry into my memory.";
        addMessage(BOT_NAME, r, "bot");
        speak(r);
        return;
    }

    // RAG/RNN Logic
    const search = queryRAG(text);
    let reply = "";
    if (search.length > 0) {
        reply = (sentiment.tone + sentences[search[0].idx].text).trim();
        addMessage(BOT_NAME, reply, "bot", sentences[search[0].idx].source);
    } else if (rnn) {
        const seed = `Q: ${text} | A: `.split('').map(c => charToIdx[c] || 0);
        reply = (sentiment.tone + rnn.generate(seed)).trim();
        addMessage(BOT_NAME, reply, "bot");
    } else {
        reply = "I'm still learning. Try the Fact tab or /wiki!";
        addMessage(BOT_NAME, reply, "bot");
    }
    speak(reply, sentiment.mood);
}

// ─── VISION & FILES ─────────────────────────────────────────────────────────
async function analyzeImage(event) {
    if (!visionModel) { addMessage("System", "Loading Vision...", "bot"); visionModel = await mobilenet.load(); }
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = async (e) => {
        const img = new Image(); img.src = e.target.result;
        img.onload = async () => {
            const res = await visionModel.classify(img);
            const desc = `I believe this is a ${res[0].className}, Honey.`;
            addMessage(USER_NAME, `<img src="${img.src}" class="img-preview">`, "user");
            addMessage(BOT_NAME, desc, "bot");
            speak(desc);
        };
    };
    reader.readAsDataURL(file);
}

async function fetchRemoteFile() {
    let url = document.getElementById('fileUrl').value;
    if (url.includes('drive.google.com')) {
        const id = url.split('/d/')[1].split('/')[0];
        url = `https://docs.google.com/uc?export=download&id=${id}`;
    }
    try {
        const res = await fetch(url).then(r => r.text());
        res.split(/[.!?]\s+/).forEach(s => { if(s.length > 20) sentences.push({text:s.trim(), source:"File"}); });
        localStorage.setItem('ravia_kb', JSON.stringify(sentences));
        updateKBStats();
        addMessage(BOT_NAME, "File content added to memory.", "bot");
    } catch(e) { addMessage("System", "Error loading file. Check CORS/Permissions.", "bot"); }
}

async function fetchWiki(topic) {
    const url = `https://en.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exintro=0&explaintext=1&titles=${encodeURIComponent(topic)}&origin=*`;
    const res = await fetch(url).then(r => r.json());
    const page = Object.values(res.query.pages)[0];
    if (page.extract) {
        page.extract.split(/[.!?]\s+/).forEach(s => { if (s.length > 25) sentences.push({ text: s.trim(), source: topic }); });
        localStorage.setItem('ravia_kb', JSON.stringify(sentences));
        updateKBStats();
    }
}

function queryRAG(query) {
    const q = query.toLowerCase().split(' ').filter(w => w.length > 3);
    return sentences.map((s, i) => {
        let score = 0; q.forEach(w => { if(s.text.toLowerCase().includes(w)) score++; });
        return { idx: i, score: score / (s.text.split(' ').length + 1) };
    }).sort((a,b) => b.score - a.score).filter(r => r.score > 0.05);
}

// ─── RNN CLASS ─────────────────────────────────────────────────────────────
class SimpleRNN {
    constructor(vSize, hSize) {
        this.vSize = vSize; this.hSize = hSize;
        this.wxh = tf.variable(tf.randomNormal([vSize, hSize], 0, 0.1));
        this.whh = tf.variable(tf.randomNormal([hSize, hSize], 0, 0.1));
        this.why = tf.variable(tf.randomNormal([hSize, vSize], 0, 0.1));
        this.bh = tf.variable(tf.zeros([hSize])); this.by = tf.variable(tf.zeros([vSize]));
    }
    generate(seed, len = 60) {
        return tf.tidy(() => {
            let h = tf.zeros([1, this.hSize]);
            for (let i = 0; i < seed.length; i++) {
                let x = tf.oneHot([seed[i]], this.vSize).asType('float32');
                h = tf.tanh(tf.add(tf.add(tf.matMul(x, this.wxh), tf.matMul(h, this.whh)), this.bh));
            }
            let res = ""; let last = seed[seed.length-1];
            for (let i = 0; i < len; i++) {
                let x = tf.oneHot([last], this.vSize).asType('float32');
                h = tf.tanh(tf.add(tf.add(tf.matMul(x, this.wxh), tf.matMul(h, this.whh)), this.bh));
                let y = tf.add(tf.matMul(h, this.why), this.by);
                last = tf.argMax(y, 1).dataSync()[0];
                if (idxToChar[last] === "|" || idxToChar[last] === "\n") break;
                res += idxToChar[last] || "";
            }
            return res.trim();
        });
    }
}

async function trainRNN() {
    const text = document.getElementById('corpus').value;
    const vocabSet = Array.from(new Set(text));
    vocabSet.forEach((c, i) => { charToIdx[c] = i; idxToChar[i] = c; });
    rnn = new SimpleRNN(vocabSet.length, 64);
}

// ─── UI HELPERS ─────────────────────────────────────────────────────────────
function addMessage(sender, text, type, source) {
    const win = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = `bubble ${type}`;
    div.innerHTML = `<strong>${sender}:</strong> ${text}`;
    if (source) div.innerHTML += `<br><small style="color:var(--accent); font-size:0.6rem">Memory: ${source}</small>`;
    win.appendChild(div); win.scrollTop = win.scrollHeight;
}
function updateKBStats() { document.getElementById('mem-status').textContent = `${sentences.length} Facts Saved`; }
function openTab(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}
function clearMemory() { if(confirm("Clear memory?")) { localStorage.removeItem('ravia_kb'); sentences = []; updateKBStats(); } }

// Initialization
['Biology', 'Space', 'History', 'Etiquette'].forEach(p => {
    const b = document.createElement('button'); b.textContent = p; b.onclick = () => fetchWiki(p);
    document.getElementById('preset-container').appendChild(b);
});
trainRNN(); updateKBStats();
</script>
</body>
</html>
